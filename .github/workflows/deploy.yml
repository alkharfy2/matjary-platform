name: CI & Auto Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main]

jobs:
  # ─── Build & Lint Check ───
  ci:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

  # ─── Sync main → master (triggers Vercel auto-deploy) ───
  sync-master:
    name: Sync master branch
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to master
        run: git push origin main:master --force
